services:
  - type: web
    name: nexus-banking-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: render
      - key: DEMO_BANKING_MODE
        value: "true"
      - key: BANKING_RAILS_MODE
        value: simulation
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "443"
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET_KYC
        value: kyc
      - key: MINIO_BUCKET_STATEMENTS
        value: statements
      - key: MINIO_BUCKET_PHOTOS
        value: photos
      - key: MINIO_BUCKET_SIGNATURES
        value: signatures
      - key: MINIO_BUCKET_REPORTS
        value: reports
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SMTP_HOST
        value: smtp-relay.brevo.com
      - key: BREVO_SMTP_PORT
        value: "587"
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_PASSWORD
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: RATE_LIMIT_TTL_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
